name: Deploy to Hostinger (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  ftp-deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # A Hostinger ocasionalmente derruba a conexão FTP por instabilidade
      # transitória (timeout no socket de controle). Como o SamKirkland/
      # FTP-Deploy-Action não tem retry embutido, encadeamos até 3
      # tentativas com backoff antes de marcar o deploy como falho.
      - name: Publicar via FTP (tentativa 1/3)
        id: ftp_attempt_1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          server-dir: /public_html/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/*.md

      - name: Aguardar antes da 2ª tentativa
        if: steps.ftp_attempt_1.outcome == 'failure'
        run: sleep 20

      - name: Publicar via FTP (tentativa 2/3)
        id: ftp_attempt_2
        if: steps.ftp_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          server-dir: /public_html/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/*.md

      - name: Aguardar antes da 3ª tentativa
        if: steps.ftp_attempt_1.outcome == 'failure' && steps.ftp_attempt_2.outcome == 'failure'
        run: sleep 30

      - name: Publicar via FTP (tentativa 3/3)
        if: steps.ftp_attempt_1.outcome == 'failure' && steps.ftp_attempt_2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          server-dir: /public_html/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/*.md
